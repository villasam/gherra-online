<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gherra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="home" class="screen">
        <h1>Gherra</h1>

        <div class="panel">

            <input id="playerNameInput" type="text" placeholder="Il tuo nome">

            <button id="createRoomButton" class="main-create-button">
                Crea stanza
            </button>

            <div class="big-separator">
                oppure
            </div>

            <input id="roomCodeInput" type="text" placeholder="Codice stanza">

            <button id="joinRoomButton">
                Entra nella stanza
            </button>
        </div>
    </section>

    <section id="lobby" class="screen" style="display: none;">
        <h1>Lobby</h1>

        <div class="panel">
            <p>Codice stanza:</p>
            <div class="room-code" id="roomCodeDisplay"></div>

            <p>Stato: <strong id="myReadyDisplay">Non pronto</strong></p>

            <button id="readyButton">Pronto</button>
        </div>

        <div class="panel">
            <h2>Giocatori</h2>
            <ul id="playersList"></ul>
            <p id="readyInfoDisplay"></p>
        </div>
    </section>

    <section id="game" class="screen" style="display: none;">

        <div class="turn-box">
            Turno di: <strong id="currentTurnDisplay"></strong>
        </div>

        <p id="winnerMessage" class="winner-message"></p>

        <button id="restartGameButton" style="display: none;">
            Ricomincia partita
        </button>

        <section class="panel main-panel">
            <h2>Giocatori</h2>
            <div id="gamePlayersList" class="players-grid"></div>
        </section>

        <section class="panel">
            <h2>Ultima azione</h2>
            <p id="lastActionDisplay" class="last-action">
                Nessuna azione ancora.
            </p>
        </section>

        <section class="panel">
            <h2>Azioni</h2>

            <button id="chargeButton">Carica</button>

            <div class="action-block">
                <label for="defenseTargetSelect">Bersaglio difesa</label>
                <select id="defenseTargetSelect"></select>
                <button id="changeDefenseButton">Cambia difesa</button>
            </div>

            <div class="action-block">
                <label for="attackTargetSelect">Bersaglio attacco</label>
                <select id="attackTargetSelect"></select>

                <p>Carichi da usare:</p>
                <div id="chargesButtonsContainer" class="charge-buttons"></div>

                <p>
                    Carichi selezionati:
                    <strong id="selectedChargesDisplay">0</strong>
                </p>

                <button id="attackButton">Attacca</button>
            </div>
        </section>
    </section>

    <p id="message" class="message"></p>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>

</body>

</html>
